# .github/workflows/ci.yml
#
# Perch CI — runs on every push to dev and on PRs targeting main.
#
# Pipeline:
#   1. ESLint   — fast failure on lint errors
#   2. Vitest   — unit tests (pure logic, no network)
#   3. Vite build — verify the bundle compiles cleanly
#
# Integration tests against the Supabase local emulator are deferred
# to Phase 2 when Docker is available on the runner.

name: CI

on:
  push:
    branches: [dev]
  pull_request:
    branches: [main]

jobs:
  ci:
    name: Lint → Test → Build
    runs-on: ubuntu-latest

    steps:
      # ── Checkout ──────────────────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4

      # ── Node setup ────────────────────────────────────────────────────────
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      # ── Install dependencies ───────────────────────────────────────────────
      - name: Install dependencies
        run: npm ci

      # ── Step 1: ESLint ────────────────────────────────────────────────────
      - name: Lint (ESLint)
        run: npm run lint

      # ── Step 2: Unit tests ────────────────────────────────────────────────
      - name: Unit tests (Vitest)
        run: npm test
        env:
          # Provide dummy values so any module that reads import.meta.env
          # at module-parse time does not crash. Real network calls are
          # mocked in the test files.
          VITE_SUPABASE_URL: https://placeholder.supabase.co
          VITE_SUPABASE_ANON_KEY: placeholder-anon-key
          VITE_GOOGLE_MAPS_API_KEY: placeholder-maps-key

      # ── Step 3: Production build ───────────────────────────────────────────
      - name: Build (Vite)
        run: npm run build
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          VITE_GOOGLE_MAPS_API_KEY: ${{ secrets.VITE_GOOGLE_MAPS_API_KEY }}
