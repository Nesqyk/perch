<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Find your spot before the panic does. Real-time campus space finder." />
  <meta name="theme-color" content="#1a6b3c" />

  <title>Perch - Find Your Spot</title>

  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />

  <link rel="stylesheet" href="/src/styles/main.css" />
  <link rel="stylesheet" href="/src/styles/map.css" />
  <link rel="stylesheet" href="/src/styles/mapPopup.css" />
  <link rel="stylesheet" href="/src/styles/sidebar.css" />
  <link rel="stylesheet" href="/src/styles/bottomSheet.css" />
  <link rel="stylesheet" href="/src/styles/spotCard.css" />
  <link rel="stylesheet" href="/src/styles/filters.css" />
  <link rel="stylesheet" href="/src/styles/navMenu.css" />
</head>
<body>
  <main id="app-layout" class="app-layout">
    <div id="map-container" class="map-container view--active" aria-label="Campus map">
      <div class="map-legend" aria-label="Map legend">
        <span class="map-legend-dot map-legend-dot--free"></span><span>Free</span>
        <span class="map-legend-dot map-legend-dot--maybe"></span><span>Maybe</span>
        <span class="map-legend-dot map-legend-dot--full"></span><span>Full</span>
      </div>
    </div>

    <aside id="panel" class="panel view--active" aria-label="Spot panel">
      <div id="panel-handle" class="panel-handle" aria-hidden="true"></div>
      <div id="panel-content" class="panel-content"></div>
    </aside>

    <section id="view-profile" class="page-view" aria-label="Profile and settings"></section>
    <section id="view-group" class="page-view" aria-label="My squad"></section>
    <section id="view-settings" class="page-view" aria-label="App settings"></section>
    <section id="view-contributions" class="page-view" aria-label="My contributions"></section>
    <section id="view-notifications" class="page-view" aria-label="Notifications"></section>
  </main>

  <div id="toast-container" class="toast-container" aria-live="polite" aria-atomic="false"></div>

  <div id="modal-overlay" class="modal-overlay" aria-modal="true" role="dialog" hidden>
    <div id="modal-box" class="modal-box">
      <div id="modal-content"></div>
    </div>
  </div>

  <div id="report-modal-overlay" class="modal-overlay" aria-modal="true" role="dialog" hidden>
    <div id="report-modal-box" class="modal-box modal-box--report">
      <div id="report-modal-content"></div>
    </div>
  </div>

  <div id="profile-modal-overlay" class="modal-overlay" aria-modal="true" role="dialog" hidden>
    <div id="profile-modal-box" class="modal-box modal-box--profile">
      <div id="profile-modal-content"></div>
    </div>
  </div>

  <div id="submit-modal-overlay" class="modal-overlay" aria-modal="true" role="dialog" hidden>
    <div id="submit-modal-box" class="modal-box modal-box--submit">
      <div id="submit-modal-content"></div>
    </div>
  </div>

  <div id="spot-modal-overlay" class="modal-overlay" aria-modal="true" role="dialog" hidden>
    <div id="spot-modal-box" class="modal-box modal-box--spot">
      <div id="spot-modal-content"></div>
    </div>
  </div>

  <script type="module" src="/src/main.js"></script>
</body>
</html>
